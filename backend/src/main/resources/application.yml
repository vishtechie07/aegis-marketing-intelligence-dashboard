spring:
  application:
    name: aegis-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aegis}
    username: ${SPRING_DATASOURCE_USERNAME:aegis}
    password: ${SPRING_DATASOURCE_PASSWORD:aegis_secret}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  compression:
    enabled: true

aegis:
  harvest:
    competitors: ${AEGIS_TRACKED_COMPETITORS:Microsoft,Google,Amazon,OpenAI,Anthropic}

  sources:
    rss:
      cron: "0 */30 * * * *"   # every 30 minutes
      feeds: >
        https://techcrunch.com/feed/,
        https://feeds.arstechnica.com/arstechnica/index,
        https://www.theverge.com/rss/index.xml,
        https://aws.amazon.com/blogs/aws/feed/,
        https://blogs.microsoft.com/feed/,
        https://openai.com/news/rss.xml,
        https://www.anthropic.com/rss.xml,
        https://blog.google/technology/ai/rss/,
        https://feeds.feedburner.com/venturebeat/SZYF

    gdelt:
      cron: "0 */15 * * * *"   # every 15 minutes (GDELT updates every 15 min)

    reddit:
      cron: "0 */30 * * * *"   # every 30 minutes

    hackernews:
      cron: "0 */20 * * * *"   # every 20 minutes

    edgar:
      cron: "0 0 */4 * * *"    # every 4 hours (SEC filings are infrequent)

    github:
      cron: "0 0 * * * *"      # every hour
      org-map: "{'Microsoft':'microsoft','Google':'google','Amazon':'aws','OpenAI':'openai','Anthropic':'anthropic'}"

    googlenews:
      cron: "0 */5 * * * *"    # every 5 minutes — fastest real-time news source

    financial:
      cron: "0 0 * * * *"      # every hour — Yahoo Finance stock/financial data

    contracts:
      cron: "0 0 */4 * * *"    # every 4 hours — USASpending.gov government contracts

    industry:
      cron: "0 0 6 * * *"      # daily at 06:00 UTC — World Bank + FRED macro data

logging:
  level:
    com.aegis: INFO
    org.springframework.ai: WARN
